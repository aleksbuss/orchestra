name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        # Standalone `tsc --noEmit`. `next build` only type-checks files in the
        # app graph, so a type error in a *.test.ts (or any non-imported module)
        # slips through CI without this — exactly how a bad cast in
        # schema-version.test.ts reached a PR. Catch the whole tree here.
        run: npm run typecheck

      - name: Unit tests + coverage thresholds (vitest)
        # Coverage gates live in vitest.config.ts. The job fails if any
        # per-module floor or the global floor regresses. Raising floors
        # is encouraged in PRs that add tests; lowering them silently to
        # keep CI green is forbidden — see PM #15/#16 doc updates.
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build
        run: npm run build
        env:
          # Build runs without real keys; routes that need them are lazy.
          OPENAI_API_KEY: dummy-key-for-build
          ORCHESTRA_AUTH_SECRET: dummy-build-secret

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          OPENAI_API_KEY: dummy-key-for-build
          ORCHESTRA_AUTH_SECRET: dummy-build-secret

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
